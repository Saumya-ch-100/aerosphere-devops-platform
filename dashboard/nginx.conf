server {
    listen 80;
    server_name localhost;

    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        try_files $uri $uri/ /index.html;
    }

    # Proxy API requests to backend microservices
    location /api/flight-ops/ {
        proxy_pass http://flight-ops:80/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /api/telemetry/ {
        proxy_pass http://telemetry:80/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /api/maintenance/ {
        proxy_pass http://maintenance:80/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /api/weather-intel/ {
        proxy_pass http://weather-intel:80/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /api/baggage-ops/ {
        proxy_pass http://baggage-ops:80/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /api/passenger-ops/ {
        proxy_pass http://passenger-ops:80/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /api/prometheus/ {
        proxy_pass http://prometheus-kube-prometheus-prometheus.monitoring.svc.cluster.local:9090/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /api/vault/ {
        proxy_pass http://vault.vault.svc.cluster.local:8200/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
