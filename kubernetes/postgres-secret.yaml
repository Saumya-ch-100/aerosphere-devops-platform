apiVersion: v1
kind: Secret
metadata:
  name: postgres-credentials
  namespace: aerosphere-prod
type: Opaque
stringData:
  POSTGRES_USER: "aerosphere_admin"
  # This password should be managed by Vault in a real production environment
  # Vault can inject this directly or manage dynamic credentials
  POSTGRES_PASSWORD: "PLEASE_REPLACE_VIA_VAULT_OR_CI"
