# Values for hashicorp/vault Helm Chart

server:
  dev:
    enabled: true
    # In dev mode, Vault automatically enables KV v2 at "secret/"
  dataStorage:
    enabled: false
  
injector:
  enabled: true
  
# Automated Kubernetes Auth configuration for Vault
server:
  postStart:
    - "/bin/sh"
    - "-c"
    - |
      sleep 5
      vault auth enable kubernetes
      vault write auth/kubernetes/config \
        kubernetes_host="https://\$KUBERNETES_SERVICE_HOST:\$KUBERNETES_SERVICE_PORT"
      
      # Write policy
      vault policy write aerosphere - <<EOF
      path "secret/data/aerosphere/*" {
        capabilities = ["read", "list"]
      }
      EOF
      
      # Bind ServiceAccount
      vault write auth/kubernetes/role/aerosphere \
        bound_service_account_names=aerosphere-app-sa \
        bound_service_account_namespaces=aerosphere-prod \
        policies=aerosphere \
        ttl=24h
        
      # Write mock Postgres secret
      vault kv put secret/aerosphere/postgres \
        POSTGRES_USER=aerosphere_admin \
        POSTGRES_PASSWORD=secure_password_from_vault
