services:

  postgres-db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: aerosphere_admin
      POSTGRES_PASSWORD: secure_password_from_vault
      POSTGRES_DB: postgres
    ports:
      - "5432:5432"

  vault:
    image: vault:1.13.3
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: root
      VAULT_DEV_LISTEN_ADDRESS: "0.0.0.0:8200"
    ports:
      - "8200:8200"
    cap_add:
      - IPC_LOCK

  prometheus:
    image: prom/prometheus:latest
    volumes:
      - ./infrastructure/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"

  grafana:
    image: grafana/grafana:latest
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    ports:
      - "3000:3000"
    depends_on:
      - prometheus

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.10.2
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    ports:
      - "9200:9200"

  logstash:
    image: docker.elastic.co/logstash/logstash:8.10.2
    volumes:
      - ./infrastructure/logstash/logstash.conf:/usr/share/logstash/pipeline/logstash.conf
    ports:
      - "5044:5044"
    depends_on:
      - elasticsearch

  kibana:
    image: docker.elastic.co/kibana/kibana:8.10.2
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
    ports:
      - "5601:5601"
    depends_on:
      - elasticsearch

  flight-ops:
    build: ./services/flight-ops
    ports:
      - "8001:8001"
    environment:
      - NODE_ENV=development
      - DB_HOST=postgres-db
      - VAULT_ADDR=http://vault:8200
      - VAULT_TOKEN=root
    depends_on:
      - postgres-db
      - vault

  telemetry:
    build: ./services/telemetry
    ports:
      - "8002:8002"
    environment:
      - NODE_ENV=development

  maintenance:
    build: ./services/maintenance
    ports:
      - "8003:8003"
    environment:
      - NODE_ENV=development

  weather-intel:
    build: ./services/weather-intel
    ports:
      - "8004:8004"
    environment:
      - NODE_ENV=development

  baggage-ops:
    build: ./services/baggage-ops
    ports:
      - "8005:8005"
    environment:
      - NODE_ENV=development

  passenger-ops:
    build: ./services/passenger-ops
    ports:
      - "8006:8006"
    environment:
      - NODE_ENV=development

  dashboard:
    build: ./dashboard
    ports:
      - "8080:80"
    depends_on:
      - flight-ops
      - prometheus
      - vault
